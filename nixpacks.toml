# Nixpacks configuration for Railway deployment
[phases.setup]
nixPkgs = ["nodejs_20", "nodejs_20.pkgs.npm"]

[phases.build]
nixPkgs = ["nodejs_20", "nodejs_20.pkgs.npm"]
cmds = [
  "cd backend && npm install",
  "cd frontend && npm install",
  "cd frontend && npm run build"
]

[phases.start]
nixPkgs = ["nodejs_20", "nodejs_20.pkgs.npm"]
cmds = [
  "node server.js"
]

[start]
cmd = "cd backend && npm start"
